# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/airpick_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Firebase
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:src/main/resources/airpick-a022d-firebase-adminsdk-fbsvc-939d4d21f5.json}
#/Users/nate/Documents/airpick_service/src/main/resources/airpick-a022d-firebase-adminsdk-fbsvc-939d4d21f5.json
# JWT
jwt.secret=${JWT_SECRET:dev_secret_key_for_local_use_only_min_32_chars!!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Swagger / OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# Veriff identity verification
veriff.api-key=${VERIFF_API_KEY:}
veriff.shared-secret=${VERIFF_SHARED_SECRET:}
veriff.base-url=${VERIFF_BASE_URL:}
veriff.callback-url=${VERIFF_CALLBACK_URL:}

# Google Cloud Storage (ADC — no JSON key file on GCP)
gcp.storage.bucket-name=${GCP_STORAGE_BUCKET_NAME:}
gcp.store.bucket-profile-name=${GCP_STORE_BUCKET_PROFILE_NAME:}
gcp.storage.signed-url-duration-minutes=${GCP_STORAGE_SIGNED_URL_DURATION_MINUTES:15}

# Multipart upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Temporary: verbose Flyway output for debugging
#logging.level.org.flywaydb=DEBUG

# WebSocket STOMP routing debug — shows why @MessageMapping is or isn't matched
logging.level.org.springframework.messaging=DEBUG
logging.level.org.springframework.web.socket=DEBUG
