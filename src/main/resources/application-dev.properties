# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/airpick_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Firebase
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:src/main/resources/firebase-service-account.json}

# JWT
jwt.secret=${JWT_SECRET:dev_secret_key_for_local_use_only_min_32_chars!!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Swagger / OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
