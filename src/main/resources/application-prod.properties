# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Firebase
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Swagger / OpenAPI (disabled in production)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

# Veriff identity verification
veriff.api-key=${VERIFF_API_KEY}
veriff.shared-secret=${VERIFF_SHARED_SECRET}
veriff.base-url=${VERIFF_BASE_URL}
veriff.callback-url=${VERIFF_CALLBACK_URL:}

# Google Cloud Storage (ADC — no JSON key file on GCP)
gcp.storage.bucket-name=${GCP_STORAGE_BUCKET_NAME:}
gcp.store.bucket-profile-name=${GCP_STORE_BUCKET_PROFILE_NAME:}
gcp.storage.signed-url-duration-minutes=${GCP_STORAGE_SIGNED_URL_DURATION_MINUTES:15}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
